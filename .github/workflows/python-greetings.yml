name: Python Greetings CI/CD

on:
  push:
    branches:
      - main

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Install Python dependencies
        working-directory: python-greetings
        shell: powershell
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Stop old dev app
        shell: powershell
        run: |
          pm2 delete greetings-app-dev
          exit 0

      - name: Create dev script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\pm2-scripts" | Out-Null
          @"
          Set-Location "${{ github.workspace }}\python-greetings"
          py -c "from app import app; app.run(host='127.0.0.1', port=7001, debug=False, use_reloader=False)"
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\run-dev.ps1"

      - name: Start dev app
        shell: powershell
        run: |
          pm2 start powershell --name greetings-app-dev --interpreter none -- -NoProfile -ExecutionPolicy Bypass -File "$env:USERPROFILE\pm2-scripts\run-dev.ps1"

      - name: Wait for dev health check
        shell: powershell
        run: |
          $ok = $false
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:7001/greetings -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                $ok = $true
                break
              }
            } catch {}
            Start-Sleep -Seconds 2
          }

          if (-not $ok) {
            Write-Host "Dev app did not start."
            pm2 describe greetings-app-dev
            $errLog = "$env:USERPROFILE\.pm2\logs\greetings-app-dev-error.log"
            $outLog = "$env:USERPROFILE\.pm2\logs\greetings-app-dev-out.log"
            if (Test-Path $errLog) { Get-Content $errLog -Tail 50 }
            if (Test-Path $outLog) { Get-Content $outLog -Tail 50 }
            throw "Health check failed for dev"
          }

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Install deps
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install

      - name: Run tests
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Stop old stg app
        shell: powershell
        run: |
          pm2 delete greetings-app-stg
          exit 0

      - name: Create stg script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\pm2-scripts" | Out-Null
          @"
          Set-Location "${{ github.workspace }}\python-greetings"
          py -c "from app import app; app.run(host='127.0.0.1', port=7002, debug=False, use_reloader=False)"
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\run-stg.ps1"

      - name: Start stg app
        shell: powershell
        run: |
          pm2 start powershell --name greetings-app-stg --interpreter none -- -NoProfile -ExecutionPolicy Bypass -File "$env:USERPROFILE\pm2-scripts\run-stg.ps1"

      - name: Wait for stg health check
        shell: powershell
        run: |
          $ok = $false
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:7002/greetings -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                $ok = $true
                break
              }
            } catch {}
            Start-Sleep -Seconds 2
          }

          if (-not $ok) {
            Write-Host "Stg app did not start."
            pm2 describe greetings-app-stg
            $errLog = "$env:USERPROFILE\.pm2\logs\greetings-app-stg-error.log"
            $outLog = "$env:USERPROFILE\.pm2\logs\greetings-app-stg-out.log"
            if (Test-Path $errLog) { Get-Content $errLog -Tail 50 }
            if (Test-Path $outLog) { Get-Content $outLog -Tail 50 }
            throw "Health check failed for stg"
          }

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
