name: Python Greetings CI/CD

on:
  push:
    branches:
      - main

jobs:
  install-pip-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: python-greetings
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
  deploy-to-dev:
    runs-on: ubuntu-latest
    needs: install-pip-deps

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to dev
        working-directory: python-greetings
        run: |
          echo "Deploying application to dev environment"
  tests-on-dev:
    runs-on: ubuntu-latest
    needs: deploy-to-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install dependencies
        working-directory: course-js-api-framework
        run: |
          npm install

      - name: Run tests for dev
  	working-directory: course-js-api-framework
  	run: |
    	  npm install
    	  npm run greetings greetings_dev
  deploy-to-stg:
    runs-on: ubuntu-latest
    needs: tests-on-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to stg
        working-directory: python-greetings
        run: |
          echo "Deploying application to stg environment"
  tests-on-stg:
    runs-on: ubuntu-latest
    needs: deploy-to-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install dependencies
        working-directory: course-js-api-framework
        run: |
          npm install

      - name: Run tests for stg
        working-directory: course-js-api-framework
        run: |
          npm run greetings greetings_stg
  deploy-to-preprod:
    runs-on: ubuntu-latest
    needs: tests-on-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to preprod
        working-directory: python-greetings
        run: |
          echo "Deploying application to preprod environment"
  tests-on-preprod:
    runs-on: ubuntu-latest
    needs: deploy-to-preprod

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install dependencies
        working-directory: course-js-api-framework
        run: |
          npm install

      - name: Run tests for preprod
        working-directory: course-js-api-framework
        run: |
          npm run greetings greetings_preprod
  deploy-to-prod:
    runs-on: ubuntu-latest
    needs: tests-on-preprod

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to prod
        working-directory: python-greetings
        run: |
          echo "Deploying application to production environment"