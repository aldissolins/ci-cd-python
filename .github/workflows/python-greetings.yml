        run: |
          echo ===== PM2 DESCRIBE =====
          pm2 describe greetings-app-preprod
          echo ===== PM2 ERROR LOG =====
          if exist "%USERPROFILE%\.pm2\logs\greetings-app-preprod-error.log" type "%USERPROFILE%\.pm2\logs\greetings-app-preprod-error.log"
          echo ===== PM2 OUT LOG =====
          if exist "%USERPROFILE%\.pm2\logs\greetings-app-preprod-out.log" type "%USERPROFILE%\.pm2\logs\greetings-app-preprod-out.log"

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
