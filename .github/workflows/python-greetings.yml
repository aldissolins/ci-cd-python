      - name: Print test prod info
        shell: powershell
        run: |
          Write-Host "Running tests on prod environment"

      - name: Install dependencies
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install

      - name: Run tests for prod
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm run greetings greetings_prod