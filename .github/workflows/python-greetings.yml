name: Python Greetings CI/CD

on:
  push:
    branches:
      - main

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Install Python dependencies
        working-directory: python-greetings
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing dev app
        shell: powershell
        run: |
          pm2 delete greetings-app-dev
          if ($LASTEXITCODE -ne 0) { exit 0 }

      - name: Deploy to dev
        working-directory: python-greetings
        run: |
          pm2 start app.py --name greetings-app-dev --interpreter python -- --port 7001

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install dependencies
        working-directory: course-js-api-framework
        run: |
          npm install

      - name: Run tests for dev
        working-directory: course-js-api-framework
        run: |
          npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing stg app
        shell: powershell
        run: |
          pm2 delete greetings-app-stg
          if ($LASTEXITCODE -ne 0) { exit 0 }

      - name: Deploy to stg
        working-directory: python-greetings
        run: |
          pm2 start app.py --name greetings-app-stg --interpreter python -- --port 7002

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install dependencies
        working-directory: course-js-api-framework
        run: |
          npm install

      - name: Run tests for stg
        working-directory: course-js-api-framework
        run: |
          npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing preprod app
        shell: powershell
        run: |
          pm2 delete greetings-app-preprod
          if ($LASTEXITCODE -ne 0) { exit 0 }

      - name: Deploy to preprod
        working-directory: python-greetings
        run: |
          pm2 start app.py --name greetings-app-preprod --interpreter python -- --port 7003

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install dependencies
        working-directory: course-js-api-framework
        run: |
          npm install

      - name: Run tests for preprod
        working-directory: course-js-api-framework
        run: |
          npm run greetings greetings_preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing prod app
        shell: powershell
        run: |
          pm2 delete greetings-app-prod
          if ($LASTEXITCODE -ne 0) { exit 0 }

      - name: Deploy to prod
        working-directory: python-greetings
        run: |
          pm2 start app.py --name greetings-app-prod --interpreter python -- --port 7004