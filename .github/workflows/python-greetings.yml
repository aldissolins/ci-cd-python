name: Python Greetings CI/CD

on:
  push:
    branches:
      - main

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Install Python dependencies
        working-directory: python-greetings
        shell: powershell
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Stop old app
        shell: powershell
        run: |
          pm2 delete greetings-app-dev
          exit 0

      - name: Create start script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\pm2-scripts" | Out-Null
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          py -c "from app import app; app.run(host='0.0.0.0', port=7001, debug=False)"
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\dev.bat"

      - name: Start app
        shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\dev.bat" --name greetings-app-dev
          Start-Sleep -Seconds 10

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Install deps
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install

      - name: Wait for app
        shell: powershell
        run: |
          Start-Sleep -Seconds 5

      - name: Run tests
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - shell: powershell
        run: |
          pm2 delete greetings-app-stg
          exit 0

      - shell: powershell
        run: |
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          py -c "from app import app; app.run(host='0.0.0.0', port=7002, debug=False)"
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\stg.bat"

      - shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\stg.bat" --name greetings-app-stg
          Start-Sleep -Seconds 10

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install
          Start-Sleep -Seconds 5
          npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - shell: powershell
        run: |
          pm2 delete greetings-app-preprod
          exit 0

      - shell: powershell
        run: |
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          py -c "from app import app; app.run(host='0.0.0.0', port=7003, debug=False)"
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\preprod.bat"

      - shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\preprod.bat" --name greetings-app-preprod
          Start-Sleep -Seconds 10

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install
          Start-Sleep -Seconds 5
          npm run greetings greetings_preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - shell: powershell
        run: |
          pm2 delete greetings-app-prod
          exit 0

      - shell: powershell
        run: |
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          py -c "from app import app; app.run(host='0.0.0.0', port=7004, debug=False)"
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\prod.bat"

      - shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\prod.bat" --name greetings-app-prod
          Start-Sleep -Seconds 10

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install
          Start-Sleep -Seconds 5
          npm run greetings greetings_prod