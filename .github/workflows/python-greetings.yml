        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Print test preprod info
        shell: powershell
        run: |
          Write-Host "Running tests on preprod environment"

      - name: Install dependencies
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install

      - name: Run tests for preprod
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm run greetings greetings_preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print deploy prod info
        shell: powershell
        run: |
          Write-Host "Deploying application to prod environment on port 7004"

      - name: Stop existing prod app
        shell: powershell
        run: |
          pm2 delete greetings-app-prod
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing prod app to stop"
            exit 0
          }

      - name: Create prod start script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\pm2-scripts" | Out-Null
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          set PORT=7004
          py app.py
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\run-prod.bat"

      - name: Deploy to prod
        shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\run-prod.bat" --name greetings-app-prod
          Start-Sleep -Seconds 5

  tests-on-prod:
