      - name: Run tests
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - uses: actions/checkout@v4
        with:
