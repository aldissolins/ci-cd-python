name: Python Greetings CI/CD

on:
  push:
    branches:
      - main

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print install info
        shell: cmd
        run: echo Installing all required dependencies for python-greetings

      - name: Install Python dependencies
        working-directory: python-greetings
        shell: cmd
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print deploy dev info
        shell: cmd
        run: echo Deploying application to dev environment on port 7001

      - name: Stop old dev app
        shell: cmd
        run: |
          pm2 delete greetings-app-dev >nul 2>&1
          exit /b 0

      - name: Create dev python runner
        shell: cmd
        run: |
          (
            echo from app import app
            echo app.run(host="127.0.0.1", port=7001, debug=False, use_reloader=False)
          ) > "%GITHUB_WORKSPACE%\python-greetings\run_dev.py"

      - name: Create dev start script
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\pm2-scripts" mkdir "%USERPROFILE%\pm2-scripts"
          (
            echo @echo off
            echo cd /d "%GITHUB_WORKSPACE%\python-greetings"
            echo py run_dev.py
          ) > "%USERPROFILE%\pm2-scripts\run-dev.bat"

      - name: Start dev app
        shell: cmd
        run: |
          pm2 start "%USERPROFILE%\pm2-scripts\run-dev.bat" --name greetings-app-dev

      - name: Wait for dev app
        shell: cmd
        run: |
          powershell -Command "$ok=$false; for($i=0; $i -lt 20; $i++){ try { $r=Invoke-WebRequest -UseBasicParsing http://127.0.0.1:7001/greetings -TimeoutSec 2; if($r.StatusCode -eq 200){ $ok=$true; break } } catch {}; Start-Sleep -Seconds 2 }; if(-not $ok){ exit 1 }"

      - name: Show dev logs on failure
        if: failure()
        shell: cmd
        run: |
          echo ===== PM2 DESCRIBE =====
          pm2 describe greetings-app-dev
          echo ===== PM2 ERROR LOG =====
          if exist "%USERPROFILE%\.pm2\logs\greetings-app-dev-error.log" type "%USERPROFILE%\.pm2\logs\greetings-app-dev-error.log"
          echo ===== PM2 OUT LOG =====
          if exist "%USERPROFILE%\.pm2\logs\greetings-app-dev-out.log" type "%USERPROFILE%\.pm2\logs\greetings-app-dev-out.log"

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Print test dev info
        shell: cmd
        run: echo Running tests on dev environment

      - name: Install dependencies
        working-directory: course-js-api-framework
        shell: cmd
        run: |
          npm install

      - name: Run tests for dev
        working-directory: course-js-api-framework
        shell: cmd
        run: |
          npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print deploy stg info
        shell: cmd
        run: echo Deploying application to stg environment on port 7002

      - name: Stop old stg app
        shell: cmd
        run: |
          pm2 delete greetings-app-stg >nul 2>&1
          exit /b 0

      - name: Create stg python runner
        shell: cmd
        run: |
          (
            echo from app import app
            echo app.run(host="127.0.0.1", port=7002, debug=False, use_reloader=False)
          ) > "%GITHUB_WORKSPACE%\python-greetings\run_stg.py"

      - name: Create stg start script
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\pm2-scripts" mkdir "%USERPROFILE%\pm2-scripts"
          (
            echo @echo off
            echo cd /d "%GITHUB_WORKSPACE%\python-greetings"
            echo py run_stg.py
          ) > "%USERPROFILE%\pm2-scripts\run-stg.bat"

      - name: Start stg app
        shell: cmd
        run: |
          pm2 start "%USERPROFILE%\pm2-scripts\run-stg.bat" --name greetings-app-stg

      - name: Wait for stg app
        shell: cmd
        run: |
          powershell -Command "$ok=$false; for($i=0; $i -lt 20; $i++){ try { $r=Invoke-WebRequest -UseBasicParsing http://127.0.0.1:7002/greetings -TimeoutSec 2; if($r.StatusCode -eq 200){ $ok=$true; break } } catch {}; Start-Sleep -Seconds 2 }; if(-not $ok){ exit 1 }"

      - name: Show stg logs on failure
        if: failure()
        shell: cmd
        run: |
          echo ===== PM2 DESCRIBE =====
          pm2 describe greetings-app-stg
          echo ===== PM2 ERROR LOG =====
          if exist "%USERPROFILE%\.pm2\logs\greetings-app-stg-error.log" type "%USERPROFILE%\.pm2\logs\greetings-app-stg-error.log"
          echo ===== PM2 OUT LOG =====
          if exist "%USERPROFILE%\.pm2\logs\greetings-app-stg-out.log" type "%USERPROFILE%\.pm2\logs\greetings-app-stg-out.log"

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Print test stg info
        shell: cmd
        run: echo Running tests on stg environment

      - name: Install dependencies
        working-directory: course-js-api-framework
        shell: cmd
        run: |
          npm install

      - name: Run tests for stg
        working-directory: course-js-api-framework
        shell: cmd
        run: |
          npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
