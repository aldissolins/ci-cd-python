name: Python Greetings CI/CD

on:
  push:
    branches:
      - main

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print install stage info
        shell: powershell
        run: |
          Write-Host "Installing all required dependencies for python-greetings"

      - name: Install Python dependencies
        working-directory: python-greetings
        shell: powershell
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print deploy dev info
        shell: powershell
        run: |
          Write-Host "Deploying application to dev environment on port 7001"

      - name: Stop existing dev app
        shell: powershell
        run: |
          pm2 delete greetings-app-dev
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing dev app to stop"
            exit 0
          }

      - name: Create dev start script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\pm2-scripts" | Out-Null
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          set PORT=7001
          py app.py
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\run-dev.bat"

      - name: Deploy to dev
        shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\run-dev.bat" --name greetings-app-dev
          Start-Sleep -Seconds 5

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Print test dev info
        shell: powershell
        run: |
          Write-Host "Running tests on dev environment"

      - name: Install dependencies
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install

      - name: Run tests for dev
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print deploy stg info
        shell: powershell
        run: |
          Write-Host "Deploying application to stg environment on port 7002"

      - name: Stop existing stg app
        shell: powershell
        run: |
          pm2 delete greetings-app-stg
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing stg app to stop"
            exit 0
          }

      - name: Create stg start script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\pm2-scripts" | Out-Null
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          set PORT=7002
          py app.py
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\run-stg.bat"

      - name: Deploy to stg
        shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\run-stg.bat" --name greetings-app-stg
          Start-Sleep -Seconds 5

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone course-js-api-framework repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Print test stg info
        shell: powershell
        run: |
          Write-Host "Running tests on stg environment"

      - name: Install dependencies
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm install

      - name: Run tests for stg
        working-directory: course-js-api-framework
        shell: powershell
        run: |
          npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Print deploy preprod info
        shell: powershell
        run: |
          Write-Host "Deploying application to preprod environment on port 7003"

      - name: Stop existing preprod app
        shell: powershell
        run: |
          pm2 delete greetings-app-preprod
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing preprod app to stop"
            exit 0
          }

      - name: Create preprod start script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\pm2-scripts" | Out-Null
          @"
          @echo off
          cd /d "${{ github.workspace }}\python-greetings"
          set PORT=7003
          py app.py
          "@ | Set-Content "$env:USERPROFILE\pm2-scripts\run-preprod.bat"

      - name: Deploy to preprod
        shell: powershell
        run: |
          pm2 start "$env:USERPROFILE\pm2-scripts\run-preprod.bat" --name greetings-app-preprod
          Start-Sleep -Seconds 5

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

