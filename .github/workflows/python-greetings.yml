          clean: false

      - name: Print deploy preprod info
        shell: cmd
        run: echo Deploying application to preprod environment on port 7003

      - name: Stop old preprod app
        shell: cmd
        run: |
          pm2 delete greetings-app-preprod >nul 2>&1
          exit /b 0

      - name: Create preprod python runner
        shell: cmd
        run: |
          (
            echo from app import app
            echo app.run(host="127.0.0.1", port=7003, debug=False, use_reloader=False)
          ) > "%GITHUB_WORKSPACE%\python-greetings\run_preprod.py"

      - name: Create preprod start script
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\pm2-scripts" mkdir "%USERPROFILE%\pm2-scripts"
          (
            echo @echo off
            echo cd /d "%GITHUB_WORKSPACE%\python-greetings"
            echo py run_preprod.py
          ) > "%USERPROFILE%\pm2-scripts\run-preprod.bat"

      - name: Start preprod app
        shell: cmd
        run: |
          pm2 start "%USERPROFILE%\pm2-scripts\run-preprod.bat" --name greetings-app-preprod

      - name: Wait for preprod app
        shell: cmd
        run: |
          powershell -Command "$ok=$false; for($i=0; $i -lt 20; $i++){ try { $r=Invoke-WebRequest -UseBasicParsing http://127.0.0.1:7003/greetings -TimeoutSec 2; if($r.StatusCode -eq 200){ $ok=$true; break } } catch {}; Start-Sleep -Seconds 2 }; if(-not $ok){ exit 1 }"

      - name: Show preprod logs on failure
